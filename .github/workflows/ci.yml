name: CI
run-name: >-
  ${{
    github.event_name == 'pull_request'
      && format('Pull request checks #{0}', github.event.pull_request.number)
      || format('Main checks for {0}', github.sha)
  }}

on:
  push:
    branches:
      - main
  pull_request: {}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
