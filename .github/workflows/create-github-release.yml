name: Create GitHub Release

"on":
  workflow_run:
    workflows: ["Build and Push Docker"]
    types:
      - completed

concurrency:
  group: create-github-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate release notes from changelog
        run: node scripts/generate-github-release-notes.mjs "${{ github.event.workflow_run.head_branch }}" .github/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          body_path: .github/release-notes.md
          make_latest: true
