name: Build and Push Docker
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
      && 'Docker publish (manual)'
      || format('Docker publish {0}', github.ref_name)
  }}

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

concurrency:
  group: build-and-push-docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ github.ref_name }},enable=${{ github.ref_type == 'tag' }}
            type=sha,prefix=manual-,enable=${{ github.event_name == 'workflow_dispatch' && github.ref_type != 'tag' }}
          labels: |
            org.opencontainers.image.title=XRDB
            org.opencontainers.image.description=XRDB generates poster, backdrop, and logo images with dynamic ratings on the fly.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}#readme

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
