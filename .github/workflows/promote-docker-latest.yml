name: Promote Docker Latest
run-name: ${{ format('Promote Docker latest from {0}', github.event.workflow_run.head_branch) }}

"on":
  workflow_run:
    workflows: ["Build and Push Docker"]
    types:
      - completed

concurrency:
  group: promote-docker-latest
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Determine whether this tag should own latest
        id: latest_tag
        env:
          CURRENT_TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          git fetch --force --tags origin

          latest_tag="$(
            {
              printf '%s\n' "${CURRENT_TAG}"
              git tag --list 'v*'
            } | awk '/^v[0-9]+(\.[0-9]+){2}$/ { print }' | sort -V | tail -n 1
          )"

          echo "current_tag=${CURRENT_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"

          if [ "${CURRENT_TAG}" = "${latest_tag}" ]; then
            echo "promote=true" >> "$GITHUB_OUTPUT"
          else
            echo "promote=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: ${{ steps.latest_tag.outputs.promote == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ steps.latest_tag.outputs.promote == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote version image to latest
        if: ${{ steps.latest_tag.outputs.promote == 'true' }}
        env:
          CURRENT_TAG: ${{ steps.latest_tag.outputs.current_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          image_name="ghcr.io/$(printf '%s' "${REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          docker buildx imagetools create \
            --tag "${image_name}:latest" \
            "${image_name}:${CURRENT_TAG}"

      - name: Skip non-latest tag
        if: ${{ steps.latest_tag.outputs.promote != 'true' }}
        env:
          CURRENT_TAG: ${{ steps.latest_tag.outputs.current_tag }}
          LATEST_TAG: ${{ steps.latest_tag.outputs.latest_tag }}
        run: |
          echo "Skipping latest promotion for ${CURRENT_TAG}. ${LATEST_TAG} is currently the highest tag."
