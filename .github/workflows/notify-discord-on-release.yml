name: Notify Discord On Release

"on":
  workflow_run:
    workflows: ["Create GitHub Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to post. Leave empty to use the latest published release.
        required: false
        type: string

jobs:
  discord-release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')) }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Discord webhook secret
        id: webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          if [ -n "${WEBHOOK_URL}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "WEBHOOK_URL secret is not configured. Skipping Discord release notification."
          fi

      - name: Post release to Discord
        if: ${{ steps.webhook.outputs.enabled == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
        run: ./.github/scripts/post-discord-release.sh
