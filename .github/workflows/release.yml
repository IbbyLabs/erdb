name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag (example: v1.0.0)
        required: true
        type: string
      release_name:
        description: Release title (optional)
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify manual release runs from main
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          test "$GITHUB_REF_NAME" = "main"

      - name: Create automatic prerelease
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: Automatic Release (main)
          prerelease: true
          target_commitish: ${{ github.sha }}
          generate_release_notes: true

      - name: Create manual release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.release_name || inputs.tag_name }}
          prerelease: false
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
